# ==============================================================================
# SECTION 3 — BOT ENFORCEMENT POLICY
# ==============================================================================
# The retrieval layer MUST enforce these rules.
# ==============================================================================

policy:
  require_citation: true
  min_primary_sources_per_answer: 1
  allowed_trust_levels_for_citation: [primary]
  secondary_allowed_as_supplement: true
  max_content_age_days: 365
  must_include_disclaimer: true
  reject_if_no_primary_source: true

  disclaimers:
    investment: >
      This is general educational information, not personalised investment advice.
      Investments in securities are subject to market risks. Read all scheme-related
      documents carefully before investing. Consult a SEBI-registered Investment
      Adviser (RIA) for decisions specific to your situation.

    tax: >
      This reflects tax rules for FY 2025-26 as per Finance Act 2024. Tax law changes
      frequently and applies differently to individual circumstances. Consult a
      Chartered Accountant for personalised tax planning.

    insurance: >
      Insurance is a contract of indemnity and should be chosen based on individual
      needs, risk profile, and policy terms. Consult an IRDAI-licensed insurance
      intermediary and read the policy wordings before buying.

    compliance: >
      Regulatory text reproduced here is for information only. For statutory
      compliance, always refer to the official gazette notification or the
      regulator's website directly.

  red_flags:
    # Phrases that should trigger review — bot should NOT give answers that
    # cross into personalised advice without a human-in-loop or proper RIA cover.
    - "should I buy"
    - "which fund is best for me"
    - "which policy should I take"
    - "guaranteed returns"
    - "risk-free"
    - "will this stock go up"

# ==============================================================================
# END OF SCHEMA
